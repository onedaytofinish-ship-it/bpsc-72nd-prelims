# Netlify configuration for BPSC 72nd Prelims study site
# Static HTML/CSS/JS site — no build step needed

[build]
  publish = "Topics"
  # No build command — static site

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Serve index.html as the default page
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200